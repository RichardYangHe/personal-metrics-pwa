<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="每日数据">
  <link rel="manifest" href="/personal-metrics-pwa/manifest.webmanifest">
  <link rel="icon" href="/personal-metrics-pwa/icon.svg">
  <link rel="apple-touch-icon" href="/personal-metrics-pwa/apple-touch-icon.png">
  <title>每日数据</title>
  <style>
    :root { color-scheme: light; --bg: #f4f6f8; --panel: #ffffff; --ink: #111827; --muted: #667085; --line: #d7dde5; --soft: #eef2f6; --accent: #0f766e; --accent-2: #2563eb; --gold: #b87503; --danger: #b42318; --warn: #9a6700; --tap: 44px; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; letter-spacing: 0; }
    body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
    button, input, select, textarea { font: inherit; }
    button { min-height: var(--tap); border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 8px; padding: 0 12px; touch-action: manipulation; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 650; }
    button.blue { background: var(--accent-2); border-color: var(--accent-2); color: #fff; font-weight: 650; }
    button.ghost { background: transparent; }
    button.icon { width: var(--tap); padding: 0; display: inline-grid; place-items: center; }
    button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    button:disabled { opacity: .45; }
    input, select, textarea { width: 100%; min-height: var(--tap); border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink); padding: 10px 12px; }
    textarea { min-height: 84px; resize: vertical; }
    .hidden { display: none !important; }
    .login { min-height: 100vh; display: grid; align-content: center; gap: 16px; padding: 24px; max-width: 420px; margin: 0 auto; }
    .login h1 { margin: 0; font-size: 28px; }
    .login form { display: grid; gap: 12px; }
    .app { min-height: 100vh; }
    .topbar { position: sticky; top: 0; z-index: 20; display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 8px 10px; background: rgba(244,246,248,.96); border-bottom: 1px solid var(--line); backdrop-filter: blur(14px); }
    #todayBtn { min-width: 62px; white-space: nowrap; }
    .datebar { display: grid; grid-template-columns: 42px minmax(0, 1fr) 42px; gap: 6px; min-width: 0; }
    .datebar button { padding: 0; }
    .datebar input { text-align: center; font-weight: 700; }
    .status { font-size: 12px; color: var(--muted); text-align: right; white-space: nowrap; }
    .tools { padding: 10px; background: var(--bg); border-bottom: 1px solid var(--line); }
    .today-panel { display: grid; gap: 6px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    .today-top { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; }
    .today-title { font-size: 17px; font-weight: 800; }
    .today-sub { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .progress-track { height: 8px; border-radius: 999px; background: var(--soft); overflow: hidden; }
    .progress-fill { height: 100%; width: 0; background: var(--accent); border-radius: inherit; transition: width .18s ease; }
    .stats { display: none; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
    .stat { border: 1px solid var(--line); border-radius: 8px; padding: 7px 8px; background: #f8fafc; min-width: 0; }
    .stat b { display: block; font-size: 16px; line-height: 1.1; }
    .stat span { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; white-space: nowrap; }
    .mode-tabs { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 5px; margin-top: 7px; }
    .mode-tabs button { min-height: 36px; padding: 0 4px; font-size: 13px; }
    .quick-actions { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 6px; padding-top: 7px; }
    .quick-actions button { min-height: 38px; padding: 0 8px; font-size: 14px; }
    .advanced-tools { margin-top: 5px; border: 0; border-radius: 8px; background: transparent; overflow: hidden; }
    .advanced-tools summary { list-style: none; cursor: pointer; min-height: 26px; display: flex; align-items: center; justify-content: space-between; padding: 0 2px; color: var(--muted); font-size: 12px; }
    .advanced-tools summary::-webkit-details-marker { display: none; }
    .advanced-body { display: grid; gap: 8px; padding: 0 8px 8px; }
    .search-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .filters { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .filters button { min-height: 34px; flex: 0 0 auto; padding: 0 10px; border-radius: 999px; font-size: 13px; }
    .summary { display: flex; justify-content: space-between; gap: 10px; padding: 4px 2px 0; color: var(--muted); font-size: 12px; }
    .content { padding: 8px 10px calc(116px + env(safe-area-inset-bottom)); max-width: 980px; margin: 0 auto; }
    .section-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding: 6px 2px; }
    .section-head h2 { margin: 0; font-size: 17px; }
    .section-head span { color: var(--muted); font-size: 12px; }
    .metric-list { display: grid; gap: 8px; }
    .metric { display: grid; gap: 8px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    .metric.dirty { border-color: #b89138; box-shadow: inset 3px 0 0 #b89138; }
    .metric-main { min-width: 0; display: grid; gap: 6px; }
    .metric-title-row { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 8px; align-items: start; }
    .star { min-height: 34px; width: 34px; padding: 0; color: #98a2b3; }
    .star.on { color: var(--gold); border-color: #e7c06a; background: #fff8e6; }
    .metric-name { font-size: 16px; font-weight: 750; line-height: 1.25; white-space: normal; overflow-wrap: break-word; }
    .metric-desc { color: var(--muted); font-size: 12px; line-height: 1.3; overflow-wrap: break-word; }
    .metric-meta { display: flex; flex-wrap: wrap; gap: 5px; }
    .pill { display: inline-flex; align-items: center; min-height: 22px; padding: 2px 7px; border-radius: 999px; background: var(--soft); color: #475467; font-size: 12px; }
    .metric-context { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 8px; min-height: 30px; color: var(--muted); font-size: 13px; }
    .metric-context strong { color: var(--ink); }
    .metric-context .context-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tiny { min-height: 30px; padding: 0 9px; font-size: 12px; border-radius: 999px; }
    .tiny.accent { border-color: #a7d8d0; background: #ecfdf8; color: #0f766e; font-weight: 650; }
    .metric-detail { display: none; border-top: 1px solid var(--line); padding-top: 8px; color: #344054; font-size: 12px; line-height: 1.45; }
    .metric.expanded .metric-detail, .dense-row.expanded .metric-detail { display: block; }
    .detail-grid { display: grid; gap: 5px; }
    .detail-grid code { color: #344054; background: #f8fafc; border: 1px solid var(--line); border-radius: 6px; padding: 1px 4px; overflow-wrap: anywhere; }
    .detail-grid pre { margin: 4px 0 0; padding: 8px; background: #f8fafc; border: 1px solid var(--line); border-radius: 6px; overflow-x: auto; white-space: pre-wrap; }
    .metric-control { display: grid; gap: 6px; }
    .number-control { display: grid; grid-template-columns: 44px minmax(0, 1fr) 44px; gap: 6px; align-items: center; width: 100%; }
    .number-control input { text-align: center; padding-left: 4px; padding-right: 4px; }
    .tri { display: grid; grid-template-columns: repeat(3, minmax(48px, 1fr)); gap: 6px; width: 100%; }
    .dense-list { display: grid; gap: 5px; }
    .dense-row { display: grid; grid-template-columns: 34px minmax(0, 1fr) auto 40px; gap: 8px; align-items: center; padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    .dense-row .star { width: 34px; min-height: 34px; }
    .dense-label { font-size: 14px; font-weight: 650; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dense-sub { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dense-value { font-size: 15px; font-weight: 750; text-align: right; max-width: 128px; overflow-wrap: anywhere; }
    .dense-row .metric-detail { grid-column: 1 / -1; }
    .backfill { display: none; margin-bottom: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); gap: 8px; }
    .backfill.open { display: grid; }
    .backfill h2 { margin: 0; font-size: 17px; }
    .backfill-grid { display: grid; gap: 8px; }
    .backfill-grid.two { grid-template-columns: 1fr 1fr; }
    .backfill-result { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .backfill-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .empty { border: 1px dashed var(--line); border-radius: 8px; padding: 18px; color: var(--muted); background: rgba(255,255,255,.72); }
    .done-card { display: grid; gap: 8px; border: 1px solid #a7d8d0; border-radius: 8px; padding: 14px; background: #ecfdf8; color: #0f3f3a; }
    .done-card b { font-size: 18px; }
    .done-card span { color: #35615c; font-size: 13px; line-height: 1.45; }
    .trend-panel { display: grid; gap: 10px; }
    .trend-card { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 10px; display: grid; gap: 10px; }
    .trend-controls { display: grid; gap: 8px; }
    .range-tabs { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; }
    .range-tabs button { min-height: 34px; padding: 0 6px; font-size: 13px; }
    .trend-stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
    .trend-stat { background: #f8fafc; border: 1px solid var(--line); border-radius: 8px; padding: 8px; min-width: 0; }
    .trend-stat b { display: block; font-size: 17px; overflow-wrap: anywhere; }
    .trend-stat span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .chart-wrap { min-height: 190px; border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); padding: 8px; overflow: hidden; }
    .chart { width: 100%; height: 188px; display: block; }
    .chart-empty { display: grid; place-items: center; min-height: 188px; color: var(--muted); font-size: 13px; text-align: center; }
    .history-grid { display: grid; grid-template-columns: repeat(14, 1fr); gap: 4px; }
    .history-cell { aspect-ratio: 1; border-radius: 4px; background: #e5e7eb; border: 1px solid rgba(0,0,0,.04); }
    .history-cell.has { background: #0f766e; }
    .history-cell.low { opacity: .38; }
    .history-cell.mid { opacity: .68; }
    .history-list { display: grid; gap: 5px; }
    .history-row { display: grid; grid-template-columns: 82px minmax(0, 1fr) auto; gap: 8px; align-items: center; min-height: 38px; border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; background: #fff; }
    .history-row .date { color: var(--muted); font-size: 12px; }
    .history-row .value { font-weight: 750; overflow-wrap: anywhere; }
    .history-row .source { color: var(--muted); font-size: 11px; text-align: right; }
    .bottom { position: fixed; left: 0; right: 0; bottom: 0; z-index: 25; display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; align-items: center; padding: 10px calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left)); background: rgba(244,246,248,.97); border-top: 1px solid var(--line); backdrop-filter: blur(14px); }
    .pending { color: var(--warn); font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toast { position: fixed; left: 12px; right: 12px; bottom: calc(76px + env(safe-area-inset-bottom)); padding: 12px; border-radius: 8px; background: #20231f; color: #fff; z-index: 30; text-align: center; opacity: 0; transform: translateY(calc(100% + 90px)); transition: transform .2s ease, opacity .2s ease; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (min-width: 760px) { .tools, .content { padding-left: 14px; padding-right: 14px; } .today-panel { grid-template-columns: minmax(0, 1fr) 320px; align-items: center; } .quick-actions { grid-template-columns: repeat(3, 1fr); } .metric { grid-template-columns: minmax(0, 1fr) minmax(230px, 300px); align-items: center; } .metric-detail { grid-column: 1 / -1; } .metric-list { grid-template-columns: repeat(2, minmax(0, 1fr)); } .metric-list .metric { grid-template-columns: 1fr; } .backfill-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <main id="login" class="login hidden"><h1>每日数据</h1><form id="loginForm"><input id="passphrase" type="password" autocomplete="current-password" placeholder="登录口令"><button class="primary" type="submit">进入</button></form><div id="loginMsg" class="status"></div></main>
  <main id="app" class="app hidden"><header class="topbar"><button id="todayBtn" class="ghost" type="button">今天</button><div class="datebar"><button id="prevDay" type="button" aria-label="前一天">‹</button><input id="dateInput" type="date"><button id="nextDay" type="button" aria-label="后一天">›</button></div><div id="status" class="status">-</div></header><section class="tools"><div id="todayPanel" class="today-panel"></div><nav id="modeTabs" class="mode-tabs" aria-label="主视图"></nav><div class="quick-actions"><button id="useLatestBtn" class="blue" type="button">沿用常用</button><button id="firstMissingBtn" type="button">下一个</button><button id="backfillToggle" type="button">补录</button></div><details class="advanced-tools"><summary>搜索、分类和字段库</summary><div class="advanced-body"><div class="search-row"><input id="searchInput" type="search" placeholder="搜索字段、别名、说明"><button id="clearSearch" class="icon" type="button" aria-label="清空搜索">×</button></div><nav id="filters" class="filters" aria-label="字段筛选"></nav></div></details><div class="summary"><span id="scopeLabel">-</span><span id="dirtyLabel">-</span></div></section><section id="content" class="content"></section><footer class="bottom"><div id="pending" class="pending">无待同步</div><button id="undoBtn" type="button">撤销</button><button id="syncBtn" type="button">同步</button><button id="saveBtn" class="primary" type="button">保存</button></footer><div id="toast" class="toast"></div></main>
  <script>
  (function () {
    var BASE = "https://mumcofuervklloaotpih.supabase.co/functions/v1/metrics-pwa";
    var CATEGORY_NAMES = { body: "身体", health: "健康", medicine: "药物", supplement: "补剂", food: "食物", learning: "学习", media: "媒体", media_sleep: "媒体睡眠", mood_productivity: "心情效率", productivity: "效率", sleep: "睡眠", habit: "习惯", pet: "宠物", general: "其他" };
    var CATEGORY_ORDER = ["body", "health", "sleep", "mood_productivity", "productivity", "medicine", "supplement", "food", "learning", "media", "media_sleep", "habit", "pet", "general"];
    var DEFAULT_PINNED = ["body_weight_clothed_jin", "blood_glucose_yuyue550", "blood_glucose_post_meal_hours", "atomoxetine_total_mg", "eggs_count", "daily_nuts_bag_count", "reading_or_audiobook", "learn_english_on_x", "watched_financial_news"];
    var state = { authed: false, date: shanghaiDate(0), defs: [], values: {}, latest: {}, events: [], dirty: {}, filter: localStorage.getItem("metricsPwaFilter") || "unfilled", query: "", expanded: {}, pinned: loadPinned(), token: localStorage.getItem("metricsPwaToken") || "", queue: loadQueue(), trend: { metric: localStorage.getItem("metricsPwaTrendMetric") || "", days: Number(localStorage.getItem("metricsPwaTrendDays") || 90), data: null, loading: false }, backfillOpen: false, backfillPreview: null, backfillTouchedStart: false, backfill: { metric: "", value: "", start: "", end: "" } };
    var el = { login: document.getElementById("login"), app: document.getElementById("app"), loginForm: document.getElementById("loginForm"), passphrase: document.getElementById("passphrase"), loginMsg: document.getElementById("loginMsg"), dateInput: document.getElementById("dateInput"), status: document.getElementById("status"), todayPanel: document.getElementById("todayPanel"), modeTabs: document.getElementById("modeTabs"), searchInput: document.getElementById("searchInput"), clearSearch: document.getElementById("clearSearch"), filters: document.getElementById("filters"), useLatestBtn: document.getElementById("useLatestBtn"), firstMissingBtn: document.getElementById("firstMissingBtn"), backfillToggle: document.getElementById("backfillToggle"), scopeLabel: document.getElementById("scopeLabel"), dirtyLabel: document.getElementById("dirtyLabel"), content: document.getElementById("content"), pending: document.getElementById("pending"), undoBtn: document.getElementById("undoBtn"), saveBtn: document.getElementById("saveBtn"), toast: document.getElementById("toast") };
    var trendLoadSeq = 0;
    function shanghaiDate(offset) { var base = new Date(Date.now() + offset * 86400000); var parts = new Intl.DateTimeFormat("en-US", { timeZone: "Asia/Shanghai", year: "numeric", month: "2-digit", day: "2-digit" }).formatToParts(base); var out = {}; parts.forEach(function (part) { out[part.type] = part.value; }); return out.year + "-" + out.month + "-" + out.day; }
    function shanghaiTime() { return new Intl.DateTimeFormat("en-GB", { timeZone: "Asia/Shanghai", hour: "2-digit", minute: "2-digit", hour12: false }).format(new Date()); }
    function addDays(date, offset) { var parts = date.split("-").map(Number); var d = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2] + offset)); return d.toISOString().slice(0, 10); }
    function enumerateDateStrings(start, end) { var out = []; var cursor = start; var guard = 0; while (cursor <= end && guard < 800) { out.push(cursor); cursor = addDays(cursor, 1); guard += 1; } return out; }
    function uid() { return "pwa-" + Date.now() + "-" + Math.random().toString(16).slice(2); }
    function showToast(text) { el.toast.textContent = text; el.toast.classList.add("show"); setTimeout(function () { el.toast.classList.remove("show"); }, 1800); }
    function setStatus(text) { el.status.textContent = text; }
    function loadQueue() { try { return JSON.parse(localStorage.getItem("metricsPwaQueue") || "[]"); } catch (_) { return []; } }
    function loadPinned() { try { var saved = JSON.parse(localStorage.getItem("metricsPwaPinnedKeys") || "null"); if (Array.isArray(saved) && saved.length) return saved; } catch (_) {} return DEFAULT_PINNED.slice(); }
    function savePinned() { localStorage.setItem("metricsPwaPinnedKeys", JSON.stringify(state.pinned)); }
    function saveQueue() { localStorage.setItem("metricsPwaQueue", JSON.stringify(state.queue)); updateFooter(); }
    function enqueue(item) { state.queue.push(item); saveQueue(); showToast("已加入待同步"); }
    function cacheKeyForDay(date) { return "metricsPwaDay:" + date; }
    function saveSchemaCache(defs) { localStorage.setItem("metricsPwaSchema", JSON.stringify({ cached_at: new Date().toISOString(), definitions: defs })); }
    function saveDayCache(date, data) { localStorage.setItem(cacheKeyForDay(date), JSON.stringify({ cached_at: new Date().toISOString(), data: data })); }
    function readJson(key) { try { return JSON.parse(localStorage.getItem(key) || "null"); } catch (_) { return null; } }
    function hydrateFromCache() { var schema = readJson("metricsPwaSchema"); var day = readJson(cacheKeyForDay(state.date)); var used = false; if (schema && Array.isArray(schema.definitions)) { state.defs = schema.definitions; used = true; } if (day && day.data) { state.values = day.data.values || {}; state.latest = day.data.latest_values || {}; state.events = day.data.events || []; used = true; } if (used) { renderAll(); setStatus("本地缓存"); } }
    async function api(path, options) { var opts = options || {}; opts.credentials = "same-origin"; opts.headers = Object.assign({ "content-type": "application/json" }, opts.headers || {}); if (state.token) opts.headers.Authorization = "Bearer " + state.token; var res = await fetch(BASE + path, opts); var data = await res.json().catch(function () { return {}; }); if (res.status === 401) { state.authed = false; state.token = ""; localStorage.removeItem("metricsPwaToken"); showLogin(); throw new Error("Unauthorized"); } if (!res.ok || data.ok === false) throw new Error(data.error || "请求失败"); return data; }
    async function sendOrQueue(path, method, body) { var item = { id: uid(), path: path, method: method, body: body, created_at: new Date().toISOString() }; if (!navigator.onLine) { enqueue(item); return { queued: true }; } try { return await api(path, { method: method, body: JSON.stringify(body) }); } catch (err) { if (String(err.message) !== "Unauthorized") enqueue(item); throw err; } }
    async function flushQueue() { if (!state.queue.length || !navigator.onLine) { saveQueue(); return; } var next = []; for (var i = 0; i < state.queue.length; i += 1) { var item = state.queue[i]; try { await api(item.path, { method: item.method, body: JSON.stringify(item.body) }); } catch (err) { next = state.queue.slice(i); break; } } state.queue = next; saveQueue(); if (!state.queue.length) { showToast("同步完成"); await loadDay(); } }
    function showLogin() { el.login.classList.remove("hidden"); el.app.classList.add("hidden"); setTimeout(function () { el.passphrase.focus(); }, 50); }
    function showApp() { el.login.classList.add("hidden"); el.app.classList.remove("hidden"); }
    async function boot() { registerSW(); saveQueue(); el.dateInput.value = state.date; bindEvents(); if (state.token) { showApp(); hydrateFromCache(); } else { showLogin(); } try { if (state.token) await api("/api/session"); state.authed = true; showApp(); await loadSchema(); await loadDay(); await flushQueue(); } catch (_) { if (!state.defs.length) showLogin(); } }
    function registerSW() { if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/personal-metrics-pwa/sw.js", { scope: "/personal-metrics-pwa/" }).catch(function () {}); } }
    function bindEvents() {
      el.loginForm.addEventListener("submit", async function (event) {
        event.preventDefault();
        el.loginMsg.textContent = "验证中";
        try {
          var result = await api("/api/login", { method: "POST", body: JSON.stringify({ passphrase: el.passphrase.value }) });
          state.token = result.token || "";
          if (state.token) localStorage.setItem("metricsPwaToken", state.token);
          el.passphrase.value = "";
          state.authed = true;
          showApp();
          await loadSchema();
          await loadDay();
          el.loginMsg.textContent = "";
        } catch (err) {
          el.loginMsg.textContent = "口令不对或尝试过多";
        }
      });
      document.getElementById("todayBtn").addEventListener("click", function () { changeDate(shanghaiDate(0)); });
      document.getElementById("prevDay").addEventListener("click", function () { changeDate(addDays(state.date, -1)); });

    function useLatestForPinned() { var applied = 0; pinnedDefs().forEach(function (def) { var latest = latestFor(def); if (!hasValueFor(def) && latest) { state.dirty[def.metric_key] = latest.value; applied += 1; } }); if (!applied) return showToast("没有可沿用的常用项"); setStatus("未保存"); renderAll(); showToast("已沿用 " + applied + " 项，确认后保存"); }
    async function saveDirty() { var keys = Object.keys(state.dirty); if (!keys.length) return showToast("没有改动"); var body = { local_date: state.date, metrics: state.dirty }; var snapshot = Object.assign({}, state.dirty); state.dirty = {}; renderAll(); try { await sendOrQueue("/api/metrics", "POST", body); Object.keys(snapshot).forEach(function (key) { state.values[key] = snapshot[key]; }); showToast("已保存 " + keys.length + " 项"); await loadDay(); } catch (err) { showToast("已排队"); } }
    async function previewBackfill() { var metric = document.getElementById("backfillMetric").value; var start = document.getElementById("backfillStart").value; var end = document.getElementById("backfillEnd").value || state.date; state.backfill.metric = metric; state.backfill.start = start; state.backfill.end = end; state.backfill.value = document.getElementById("backfillValue").value; setStatus("查缺口"); var data = await api("/api/metric_gaps?metric_key=" + encodeURIComponent(metric) + "&start_date=" + encodeURIComponent(start) + "&end_date=" + encodeURIComponent(end)); state.backfillPreview = data; if (data.latest && !state.backfill.value) state.backfill.value = displayValue(data.latest.value, data.definition).replace(/ .*/, ""); if (data.latest && !state.backfillTouchedStart) { var suggested = addDays(data.latest.local_date, 1); if (suggested <= end) state.backfill.start = suggested; } renderAll(); setStatus("已预览"); }
    async function runBackfill() { var metric = document.getElementById("backfillMetric").value; var value = document.getElementById("backfillValue").value; var start = document.getElementById("backfillStart").value; var end = document.getElementById("backfillEnd").value || state.date; state.backfill = { metric: metric, value: value, start: start, end: end }; if (!metric || !value || !start || !end) return showToast("补录信息不完整"); var body = { metric_key: metric, value: castBackfillValue(metric, value), start_date: start, end_date: end, only_empty: true }; var result = await sendOrQueue("/api/backfill", "POST", body); showToast(result.queued ? "补录已排队" : "已补 " + result.inserted + " 天"); state.backfillPreview = null; await loadDay(); }
    function backfillPreviewText(data) { var latest = data.latest ? ('最近记录：' + data.latest.local_date + ' = ' + displayValue(data.latest.value, data.definition) + '<br>') : '最近没有找到记录<br>'; return latest + '范围：' + data.start_date + ' 到 ' + data.end_date + '<br>空白 ' + data.missing_count + ' 天，已有 ' + data.existing_count + ' 天。执行时只补空白，不覆盖已有记录。'; }
    function toggleBackfill() { state.backfillOpen = !state.backfillOpen; if (state.backfillOpen) { state.query = ""; el.searchInput.value = ""; var advanced = document.querySelector(".advanced-tools"); if (advanced) advanced.open = false; } renderAll(); if (state.backfillOpen) setTimeout(function () { var panel = document.querySelector(".backfill.open"); if (panel) panel.scrollIntoView({ block: "start", behavior: "smooth" }); }, 30); }
    function focusFirstMissing() { state.filter = "unfilled"; localStorage.setItem("metricsPwaFilter", state.filter); renderAll(); setTimeout(function () { var first = document.querySelector('.metric input, .metric button[data-bool]'); if (first) first.focus(); }, 30); }
    function updateFooter() { var dirtyCount = Object.keys(state.dirty).length; el.pending.textContent = state.queue.length ? "待同步 " + state.queue.length : "无待同步"; el.saveBtn.textContent = dirtyCount ? "保存 " + dirtyCount : "保存"; el.undoBtn.classList.toggle("hidden", !dirtyCount); el.dirtyLabel.textContent = dirtyCount ? "已改 " + dirtyCount + " 项" : "未修改"; }
    function visibleDefs() { var defs = editableDefs(); var q = state.query.toLowerCase(); if (q) return defs.filter(function (def) { return searchText(def).indexOf(q) !== -1; }); if (state.filter === "unfilled") return unfilledDefs(); if (state.filter === "pinned") return sortUnfilledFirst(pinnedDefs()); if (state.filter === "filled") return filledDefs(); if (state.filter.indexOf("cat:") === 0) return sortUnfilledFirst(defsForCategory(state.filter.slice(4))); return sortUnfilledFirst(defs); }
    function editableDefs() { return state.defs.filter(function (d) { return d.category !== "strength_event" && d.category !== "medicine_event"; }); }
    function pinnedDefs() { var byKey = {}; editableDefs().forEach(function (def) { byKey[def.metric_key] = def; }); return state.pinned.map(function (key) { return byKey[key]; }).filter(Boolean); }
    function unfilledDefs() { return pinnedDefs().filter(function (def) { return !hasValueFor(def); }); }
    function filledDefs() { return editableDefs().filter(hasValueFor); }
    function defsForCategory(cat) { return editableDefs().filter(function (d) { return (d.category || "general") === cat; }); }
    function categories() { var cats = unique(editableDefs().map(function (d) { return d.category || "general"; })); cats.sort(function (a, b) { return orderIndex(a) - orderIndex(b); }); return cats; }
    function scopeTitle() { if (state.query) return '搜索“' + state.query + '”'; if (state.filter === "unfilled") return "待填常用"; if (state.filter === "pinned") return "常用字段"; if (state.filter === "filled") return "已填写字段"; if (state.filter.indexOf("cat:") === 0) return CATEGORY_NAMES[state.filter.slice(4)] || state.filter.slice(4); return "全部字段"; }
    function helperText() { if (state.filter === "filled" && !state.query) return "紧凑查看已填"; if (state.filter === "unfilled") return "只显示常用未填"; return state.query ? "搜索覆盖全部字段" : "未填会排在前面"; }
    function togglePinned(key) { var index = state.pinned.indexOf(key); if (index === -1) state.pinned.unshift(key); else state.pinned.splice(index, 1); savePinned(); renderAll(); }
    function sortUnfilledFirst(defs) { return defs.slice().sort(function (a, b) { return Number(hasValueFor(a)) - Number(hasValueFor(b)); }); }
    function hasValueFor(def) { var value = valueFor(def); return !(value === null || value === undefined || value === ""); }
    function valueFor(def) { return Object.prototype.hasOwnProperty.call(state.dirty, def.metric_key) ? state.dirty[def.metric_key] : state.values[def.metric_key]; }
    function findDef(key) { return state.defs.find(function (d) { return d.metric_key === key; }); }
    function orderIndex(cat) { var index = CATEGORY_ORDER.indexOf(cat); return index === -1 ? 999 : index; }
    function unique(list) { return Array.from(new Set(list)); }
    function cleanLabel(def) { return String(def.label || def.metric_key).replace(/\n+/g, " ").replace(/\s+/g, " ").trim(); }
    function compactMeta(def) { return [CATEGORY_NAMES[def.category] || def.category || "其他", def.value_type, def.unit].filter(Boolean).join(" · "); }
    function latestFor(def) { return state.latest && state.latest[def.metric_key] ? state.latest[def.metric_key] : null; }
    function shortDate(date) { return String(date || "").slice(5); }
    function sortPinnedFirst(defs) { return defs.slice().sort(function (a, b) { var ap = state.pinned.indexOf(a.metric_key); var bp = state.pinned.indexOf(b.metric_key); ap = ap === -1 ? 9999 : ap; bp = bp === -1 ? 9999 : bp; return ap - bp || orderIndex(a.category) - orderIndex(b.category) || cleanLabel(a).localeCompare(cleanLabel(b)); }); }
    function shortDescription(def) { var text = def.description || (def.aliases && def.aliases.length ? "别名：" + def.aliases.join(" / ") : "点 i 查看字段格式"); return text.length > 86 ? text.slice(0, 84) + "…" : text; }
    function metaPills(def) { var out = []; out.push(def.value_type || "value"); if (def.unit) out.push(def.unit); out.push(CATEGORY_NAMES[def.category] || def.category || "其他"); if (def.metadata && def.metadata.source_column) out.push("列 " + def.metadata.source_column); return out; }
    function searchText(def) { return [def.metric_key, def.label, def.description, def.unit, def.category, (def.aliases || []).join(" "), (def.source_headers || []).join(" ")].join(" ").toLowerCase(); }
    function displayValue(value, def) { if (value === true) return "是"; if (value === false) return "否"; if (value === null || value === undefined || value === "") return "空"; if (typeof value === "object") return JSON.stringify(value); return String(value) + (def && def.unit ? " " + def.unit : ""); }
    function castBackfillValue(metricKey, raw) { var def = findDef(metricKey); if (!def) return raw; if (def.value_type === "number") return Number(raw); if (def.value_type === "boolean") return /^(true|yes|1|是)$/i.test(String(raw)); return raw; }
    function stepFor(def) { var key = def.metric_key; if (key.indexOf("weight") !== -1 || key.indexOf("glucose") !== -1) return 0.1; if (key.indexOf("hours") !== -1) return 0.5; if (key.indexOf("_g") !== -1) return 50; if (def.unit === "scoop") return 0.25; return 1; }
    function roundNumber(value) { return Math.round(value * 100) / 100; }
    function escapeHtml(value) { return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]; }); }
    function escapeAttr(value) { return escapeHtml(value); }
    function cssEscape(value) { if (window.CSS && CSS.escape) return CSS.escape(value); return String(value).replace(/[^a-zA-Z0-9_-]/g, "\\$&"); }
    boot();
  })();
